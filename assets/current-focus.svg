    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        
        .container {
          display: flex;
          align-items: stretch;
          justify-content: center;
          gap: 20px;
          width: 100%;
          height: 100%;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        .card {
          flex: 1;
          border: 1px solid #1f2328;
          border-radius: 3px;
          padding: 24px;
          background-color: #ffffff;
          display: flex;
          flex-direction: column;
          gap: 16px;
          align-self: center;
          min-height: 240px;
        }
        
        .icon {
          width: 40px;
          height: 40px;
          object-fit: contain;
        }
        
        .card-title {
          font-size: 18px;
          font-weight: 600;
          color: #1f2328;
          line-height: 1.4;
        }
        
        .card-description {
          font-size: 14px;
          color: #1f2328;
          line-height: 1.6;
        }
        
        @media (prefers-color-scheme: dark) {
          .card {
            background-color: #0d1117;
            border-color: #30363d;
          }
          
          .card-title {
            color: #e6edf3;
          }
          
          .card-description {
            color: #8d96a0;
          }
          
        }
      </style>
      
